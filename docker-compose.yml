# ──────────────────────────────────────────────────────────────
# Stora – Docker Compose
#
# Orchestrates the FastAPI backend and a PostgreSQL database.
#
# Usage:
#   docker compose up --build        # Start all services
#   docker compose down -v           # Stop and remove volumes
#
# Environment variables are loaded from stora-backend/.env
# (copy .env.example → .env and adjust as needed).
# ──────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stora_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stora_password}
      POSTGRES_DB: ${POSTGRES_DB:-stora_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stora_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────
  backend:
    build:
      context: ./stora-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./stora-backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Override CMD to enable hot-reload in development
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

volumes:
  postgres_data:
    driver: local
